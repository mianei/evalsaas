<script>(function(){try{var t=localStorage.getItem("interview-eval-theme");var theme=t==="light"?"light":"dark";document.documentElement.setAttribute("data-theme",theme);document.documentElement.style.colorScheme=theme}catch(e){document.documentElement.setAttribute("data-theme","dark");document.documentElement.style.colorScheme="dark"}})();</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html[data-theme="dark"],html:not([data-theme]){
  --bg:#000;--text:#fff;--muted:#a1a1aa;--subtle:#71717a;
  --border:rgba(255,255,255,.08);--card:rgba(255,255,255,.03);--card-hover:rgba(255,255,255,.05);
  --header-bg:rgba(0,0,0,.8);--announce-bg:rgba(255,255,255,.02);
  --btn-primary-bg:#fff;--btn-primary-text:#000;
  --btn-secondary-text:#fff;--btn-secondary-border:rgba(255,255,255,.2);--btn-secondary-hover:rgba(255,255,255,.05);
  --logo-bg:#fff;--logo-text:#000;--nav-active:rgba(255,255,255,.1);--nav-hover:rgba(255,255,255,.05);
  --input-bg:rgba(255,255,255,.04);--input-border:rgba(255,255,255,.1);
  --role-active-bg:#fff;--role-active-text:#000;
  --avatar-bg:rgba(139,92,246,.2);--avatar-text:#c4b5fd;
  --price-highlight-bg:#fff;--price-highlight-text:#000;--price-badge-bg:#000;--price-badge-text:#fff;
  --mock-bg:#18181b;--mock-inner:rgba(255,255,255,.05);

  --logo-marquee:#52525b;--icon-bg:rgba(139,92,246,.1);--icon-text:#a78bfa;
  --toggle-bg:rgba(255,255,255,.08);--toggle-border:rgba(255,255,255,.12);
  --modal-bg:#18181b;--r:16px;color-scheme:dark;
}
html[data-theme="light"]{
  --bg:#fff;--text:#0a0a0a;--muted:#52525b;--subtle:#71717a;
  --border:rgba(0,0,0,.08);--card:#fafafa;--card-hover:#f4f4f5;
  --header-bg:rgba(255,255,255,.85);--announce-bg:#f4f4f5;
  --btn-primary-bg:#0a0a0a;--btn-primary-text:#fff;
  --btn-secondary-text:#0a0a0a;--btn-secondary-border:rgba(0,0,0,.15);--btn-secondary-hover:rgba(0,0,0,.04);
  --logo-bg:#0a0a0a;--logo-text:#fff;--nav-active:rgba(0,0,0,.06);--nav-hover:rgba(0,0,0,.04);
  --input-bg:#fff;--input-border:rgba(0,0,0,.12);
  --role-active-bg:#0a0a0a;--role-active-text:#fff;
  --avatar-bg:rgba(139,92,246,.12);--avatar-text:#7c3aed;
  --price-highlight-bg:#0a0a0a;--price-highlight-text:#fff;--price-badge-bg:#fff;--price-badge-text:#0a0a0a;
  --mock-bg:#f4f4f5;--mock-inner:rgba(0,0,0,.04);
  --gradient-text:linear-gradient(135deg,#7c3aed,#2563eb,#0a0a0a);
  --gradient-hero:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(139,92,246,.08),transparent),radial-gradient(ellipse 60% 40% at 80% 50%,rgba(59,130,246,.06),transparent);
  --logo-marquee:#a1a1aa;--icon-bg:rgba(139,92,246,.08);--icon-text:#7c3aed;
  --toggle-bg:rgba(0,0,0,.04);--toggle-border:rgba(0,0,0,.1);
  --modal-bg:#fafafa;
}
  --modal-bg:#fafafa;color-scheme:light;
}
body{font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg)!important;color:var(--text);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
.theme-toggle{display:flex;align-items:center;justify-content:center;gap:6px;height:36px;padding:0 12px;border-radius:9999px;border:1px solid var(--toggle-border);background:var(--toggle-bg);color:var(--muted);cursor:pointer;font-size:13px;line-height:1;white-space:nowrap}
.theme-toggle:hover{color:var(--text);background:var(--nav-hover)}
.mock-inner{background:var(--mock-inner);border-radius:8px;padding:8px}
.preview-panel{background:var(--mock-bg);border-radius:12px;padding:24px}
.preview-border{border-bottom:1px solid var(--border)}
.text-muted{color:var(--muted)}
.text-subtle{color:var(--subtle)}
.skeleton-bar{height:6px;border-radius:4px;background:var(--border)}
.announce{padding:8px;text-align:center;font-size:13px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--announce-bg)}
a{color:inherit;text-decoration:none}
button,input,textarea,select{font:inherit}
.kit-container{max-width:1200px;margin:0 auto;padding:0 24px}
.kit-gradient-text{background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.kit-gradient-bg{background:var(--gradient-hero)}
.kit-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);transition:border-color .2s,background .2s}
.kit-card:hover{border-color:var(--border);background:var(--card-hover)}
.kit-btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;background:var(--btn-primary-bg);color:var(--btn-primary-text);font-weight:600;font-size:14px;border-radius:9999px;border:none;cursor:pointer;transition:opacity .2s,transform .15s;text-decoration:none}
.kit-btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.kit-btn-secondary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;background:transparent;color:var(--btn-secondary-text);font-weight:500;font-size:14px;border-radius:9999px;border:1px solid var(--btn-secondary-border);cursor:pointer;transition:background .2s;text-decoration:none}
.kit-btn-secondary:hover{background:var(--btn-secondary-hover)}
.kit-section-label{font-size:13px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.kit-heading{font-size:clamp(2rem,5vw,3.5rem);font-weight:700;letter-spacing:-.03em;line-height:1.1;color:var(--text)}
.kit-subheading{font-size:clamp(1.75rem,3vw,2.5rem);font-weight:700;letter-spacing:-.02em;line-height:1.2;color:var(--text)}
.kit-body-lg{font-size:18px;line-height:1.6;color:var(--muted)}
.kit-input,.kit-textarea{width:100%;padding:12px 16px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:12px;color:var(--text);font-size:14px;outline:none}
.kit-input:focus,.kit-textarea:focus{border-color:rgba(139,92,246,.5)}
.kit-input::placeholder,.kit-textarea::placeholder{color:var(--subtle)}
/* Header app */
header{position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);background:var(--header-bg);backdrop-filter:blur(16px)}
.header-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;color:var(--text)}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--logo-bg);color:var(--logo-text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
nav{display:flex;gap:4px}
nav a{padding:6px 12px;border-radius:8px;font-size:14px;color:var(--muted);font-weight:500;transition:color .15s,background .15s}
nav a.active,nav a:hover{background:var(--nav-active);color:var(--text)}
.role-switch{display:flex;gap:2px;border:1px solid var(--border);border-radius:9999px;padding:2px}
.role-switch button{padding:4px 10px;border:none;background:transparent;border-radius:9999px;font-size:11px;cursor:pointer;color:var(--muted);transition:all .15s}
.role-switch button.active{background:var(--role-active-bg);color:var(--role-active-text)}
.user-pill{display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:9999px;padding:6px 12px;font-size:13px;color:var(--muted)}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--avatar-bg);color:var(--avatar-text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
/* App pages */
.page-title{font-size:24px;font-weight:700;letter-spacing:-.02em}
.page-sub{color:var(--muted);font-size:14px;margin-top:4px}
.grid-3{display:grid;gap:20px;grid-template-columns:repeat(3,1fr)}
@media(max-width:900px){.grid-3{grid-template-columns:1fr}}
.col-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-weight:600;font-size:14px;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%}
.task-card{display:block;border-left:4px solid;padding:16px;margin-bottom:10px;cursor:pointer;color:inherit}
.task-card.pending{border-left-color:#fbbf24}
.task-card.evaluated{border-left-color:#60a5fa}
.task-card.confirmed{border-left-color:#34d399}
.badge{display:inline-block;padding:2px 10px;border-radius:9999px;font-size:11px;font-weight:600}
.badge-count,.badge-status{background:var(--card);color:var(--muted)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:14px;font-weight:500;margin-bottom:6px;color:var(--muted)}
.form-row{display:grid;gap:16px;grid-template-columns:1fr 1fr}
@media(max-width:640px){.form-row{grid-template-columns:1fr}}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:6px 16px;border:1px solid var(--btn-secondary-border);border-radius:9999px;font-size:13px;cursor:pointer;color:var(--muted);transition:all .15s}
.chip.selected{border-color:var(--btn-primary-bg);background:var(--btn-primary-bg);color:var(--btn-primary-text)}
[data-theme="light"] .alert-warn{color:#d97706}
[data-theme="light"] .override-note{color:#b45309}
.modal{background:var(--modal-bg);border:1px solid var(--border);color:var(--text)}
.score-btns button{border:1px solid var(--border);background:var(--card);color:var(--text)}
.score-btns button.active{background:var(--btn-primary-bg);color:var(--btn-primary-text);border-color:var(--btn-primary-bg)}
.pre-box{background:var(--input-bg)}
.dim-card{border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;background:var(--card)}
.dim-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.dim-score{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
.evidence{font-size:13px;color:var(--muted);padding-left:12px;border-left:2px solid rgba(139,92,246,.5);margin-top:4px}
.override-note{margin-top:8px;padding:8px;background:rgba(245,158,11,.1);border-radius:8px;font-size:12px;color:#fcd34d}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{border-radius:16px;padding:24px;width:100%;max-width:420px}
.modal h3{font-size:18px;margin-bottom:12px}
.score-btns{display:flex;gap:8px;margin:12px 0}
.score-btns button{width:40px;height:40px;border-radius:8px;cursor:pointer;font-weight:700}
.pre-box{border-radius:8px;padding:12px;font-size:13px;white-space:pre-wrap;max-height:200px;overflow:auto;color:var(--muted)}
.rating-lg{font-size:36px;font-weight:800;letter-spacing:-.02em}
.alert{padding:12px 16px;border-radius:12px;font-size:14px;margin-bottom:16px}
.alert-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:#fcd34d}
.alert-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.alert-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#93c5fd}
.empty{border:2px dashed var(--border);border-radius:var(--r);padding:32px;text-align:center;color:var(--subtle);font-size:14px}
.layout-2{display:grid;gap:20px;grid-template-columns:1fr 1fr}
@media(max-width:900px){.layout-2{grid-template-columns:1fr}}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:12px}
.hidden{display:none!important}
/* Landing */
.announce,.logo-bar,.section-border{background:var(--announce-bg);border-color:var(--border)}
.landing-nav{position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);background:var(--header-bg);backdrop-filter:blur(16px)}
.hero{padding:80px 0 96px}
.hero-grid{display:grid;gap:48px;align-items:center}
@media(min-width:1024px){.hero-grid{grid-template-columns:1fr 1fr}}
.mock-window{border-radius:12px;background:var(--mock-bg);padding:16px}
.mock-dots{display:flex;gap:6px;margin-bottom:12px}
.mock-dots span{width:10px;height:10px;border-radius:50%}
.logo-bar{border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:40px 0;overflow:hidden}
.logo-marquee{display:flex;gap:64px;animation:marquee 30s linear infinite;width:max-content;color:var(--logo-marquee)}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.section{padding:96px 0}
.section-border{border-top:1px solid var(--border)}
.features-grid{display:grid;gap:24px;grid-template-columns:1fr}
@media(min-width:640px){.features-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1024px){.features-grid{grid-template-columns:1fr 1fr 1fr}}
.feature-icon{width:40px;height:40px;border-radius:8px;background:var(--icon-bg);color:var(--icon-text);display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:18px}
.pricing-grid{display:grid;gap:24px;max-width:960px;margin:0 auto}
@media(min-width:768px){.pricing-grid{grid-template-columns:repeat(3,1fr)}}
.price-card{padding:24px;border-radius:16px;position:relative}
.price-card.highlight{background:var(--price-highlight-bg);color:var(--price-highlight-text)}
.price-card:not(.highlight){background:var(--card);border:1px solid var(--border)}
.price-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--price-badge-bg);color:var(--price-badge-text);padding:4px 12px;border-radius:9999px;font-size:11px;font-weight:600;white-space:nowrap}
.price-val{font-size:36px;font-weight:700;letter-spacing:-.02em}
.testimonials{columns:1;gap:16px}
@media(min-width:640px){.testimonials{columns:2}}
@media(min-width:1024px){.testimonials{columns:3}}
.testimonial-card{break-inside:avoid;margin-bottom:16px;padding:20px}
.faq-item{padding:20px;cursor:pointer}
.faq-item summary{font-weight:500;list-style:none;display:flex;justify-content:space-between;align-items:center}
.faq-item summary::-webkit-details-marker{display:none}
.faq-answer{margin-top:12px;font-size:14px;color:var(--muted);line-height:1.6}
.footer-grid{display:grid;gap:40px;padding:64px 0}
@media(min-width:768px){.footer-grid{grid-template-columns:2fr 1fr 1fr 1fr}}
.footer-bottom{border-top:1px solid var(--border);padding:32px 0;text-align:center;font-size:13px;color:var(--subtle)}
.text-center{text-align:center}
.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}.mb-8{margin-bottom:32px}.mb-16{margin-bottom:64px}
.mt-4{margin-top:16px}.mx-auto{margin-left:auto;margin-right:auto}
.max-w-xl{max-width:576px}.max-w-2xl{max-width:672px}.max-w-4xl{max-width:896px}
.flex{display:flex}.flex-wrap{flex-wrap:wrap}.gap-4{gap:16px}.justify-center{justify-content:center}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.glow{position:absolute;border-radius:50%;filter:blur(40px);animation:float 6s ease-in-out infinite;pointer-events:none}
</style>
</head>

const STORAGE_KEY = "interview-eval-html-v1";

const THEME_KEY = "interview-eval-theme";

function getTheme() { return document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark"; }
function themeToggleBtn() {
  const dark = getTheme() === "dark";
  return `<button type="button" class="theme-toggle" onclick="toggleTheme()" aria-label="${dark ? "切换到浅色模式" : "切换到深色模式"}" title="${dark ? "浅色模式" : "深色模式"}">${dark ? "☀ 浅色" : "☽ 深色"}</button>`;
}
window.toggleTheme = function() {
  const next = getTheme() === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  document.documentElement.style.colorScheme = next;
  try { localStorage.setItem(THEME_KEY, next); } catch {}

function getEffectiveScore(key, aiScore, overrides) { const o = overrides.find(x => x.dimensionKey === key); return o ? o.newScore : aiScore; }

function generateMock(input) {
  const combined = input.resume + input.interviewNotes + input.jobDescription;
  let overall = 55;
  if (combined.length > 500) overall += 10;
  if (/负责|主导|优化|提升/.test(combined)) overall += 10;
  overall = Math.min(92, Math.max(45, overall));
  const base = Math.round(overall / 20);
  const rating = overall >= 85 ? "Strong Hire" : overall >= 70 ? "Hire" : overall >= 55 ? "Weak Hire" : "No Hire";
  const keys = ["professional", "project", "communication", "fit", "growth"];
  return {
    overallScore: overall, rating,
    dimensions: keys.map((k, i) => ({ key: k, score: Math.max(1, Math.min(5, base + (i === 0 ? 1 : 0))), evidence: [`基于输入材料的${DIMENSION_LABELS[k].label}评估`] })),
    followUps: [
      { id: "fu-1", question: "请详细描述你的核心项目角色？", focus: "验证真实性", expectedDirection: "清晰说明职责" },
      { id: "fu-2", question: "遇到的最大挑战及解决方案？", focus: "问题解决", expectedDirection: "具体案例" },
      { id: "fu-3", question: "3 年职业规划？", focus: "匹配度", expectedDirection: "目标清晰" },
    ],
    redFlags: [],
    summary: `${input.candidateName} 应聘 ${input.positionTitle}，综合 ${overall} 分（${rating}）。`,
    generatedAt: new Date().toISOString(), isMock: true,
  };
}

function extractJson(text) {
  const t = text.trim();
  const m = t.match(/```(?:json)?\s*([\s\S]*?)```/);
  const s = m ? m[1].trim() : t;
  const start = s.indexOf("{"), end = s.lastIndexOf("}");
  return JSON.parse(s.slice(start, end + 1));
}

async function callAI(input) {
  const settings = loadSettings();
  if (!settings.apiKey) return { report: generateMock(input), mode: "mock", message: "未配置 API Key，使用模拟评估。前往「设置」配置。" };
  const userMsg = `评估：${input.candidateName}，岗位：${input.positionTitle}\n简历：\n${input.resume}\nJD：\n${input.jobDescription}\n面试记录：\n${input.interviewNotes}\n输出 JSON。`;
  try {
    const res = await fetch(`${settings.baseUrl}/chat/completions`, {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${settings.apiKey}` },
      body: JSON.stringify({ model: settings.model, messages: [{ role: "system", content: SYSTEM_PROMPT }, { role: "user", content: userMsg }], temperature: 0.3, max_tokens: 4096 }),
    });
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    const parsed = extractJson(data.choices?.[0]?.message?.content);
    parsed.followUps = (parsed.followUps || []).map((f, i) => ({ ...f, id: "fu-" + i }));
    parsed.redFlags = (parsed.redFlags || []).map((r, i) => ({ ...r, id: "rf-" + i }));
    parsed.generatedAt = new Date().toISOString();
    return { report: parsed, mode: "ai" };
  } catch (e) {
    return { report: generateMock(input), mode: "fallback", message: `AI 调用失败（${e.message}）。请运行 python api-proxy.py 并配置代理。` };
  }
}

  e.preventDefault();
  const selected = [...document.querySelectorAll("#f-interviewers .chip.selected")].map(c => c.dataset.name);
  state.tasks.unshift({ id: genId(), candidateName: document.getElementById("f-name").value.trim(), positionTitle: document.getElementById("f-position").value.trim(), resume: document.getElementById("f-resume").value.trim(), jobDescription: document.getElementById("f-jd").value.trim(), interviewNotes: "", assignedInterviewers: selected.length ? selected : ["李工"], status: "pending", createdBy: state.currentUser.name, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(), overrides: [] });
  saveState(state); navigate("dashboard");
};

function scoreStyle(s) {
  return s >= 4 ? "rgba(16,185,129,.2),#34d399" : s >= 3 ? "rgba(59,130,246,.2),#60a5fa" : "rgba(245,158,11,.2),#fbbf24";
}

function renderEvaluation(id) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return `<div class="kit-container" style="padding:40px"><p style="color:#71717a">任务不存在</p><a href="#dashboard" style="color:#a78bfa">返回</a></div>`;
  const r = task.report, rs = r ? RATING_STYLE[r.rating] : null;
  const canEval = task.assignedInterviewers.includes(state.currentUser.name) || state.currentUser.role !== "interviewer";
  return `<div class="kit-container" style="padding:40px 24px;max-width:960px">
    <a href="#dashboard" style="font-size:14px;color:#71717a">← 返回看板</a>
    <div style="display:flex;justify-content:space-between;margin:24px 0;flex-wrap:wrap;gap:16px">
      <div><h1 class="page-title">${esc(task.candidateName)}</h1><p class="page-sub">${esc(task.positionTitle)} · ${STATUS_LABELS[task.status]}</p></div>
      ${r ? `<div style="text-align:right"><div class="rating-lg">${r.overallScore}</div><span class="badge" style="background:${rs.bg};color:${rs.color};font-size:14px;padding:6px 14px">${r.rating}</span>${r.isMock?'<p style="font-size:11px;color:#fbbf24;margin-top:4px">模拟评估</p>':''}</div>` : ""}
    </div>
    <div id="eval-notice"></div>
    <div class="layout-2">
      <div>
        <div class="kit-card" style="padding:20px;margin-bottom:16px"><h3 style="margin-bottom:8px;font-weight:600">简历</h3><div class="pre-box">${esc(task.resume)||"（未提供）"}</div></div>
        <div class="kit-card" style="padding:20px;margin-bottom:16px"><h3 style="margin-bottom:8px;font-weight:600">岗位 JD</h3><div class="pre-box">${esc(task.jobDescription)||"（未提供）"}</div></div>
        <div class="kit-card" style="padding:20px"><h3 style="margin-bottom:8px;font-weight:600">面试记录</h3>
          <textarea id="eval-notes" rows="8" class="kit-textarea" ${task.status==="confirmed"?"disabled":""}>${esc(task.interviewNotes)}</textarea>
          ${canEval && task.status !== "confirmed" ? `<button class="kit-btn-primary" style="width:100%;margin-top:12px;border:none;cursor:pointer" onclick="generateEval('${id}')" id="gen-btn">生成 AI 评估报告</button>` : ""}
        </div>
      </div>
      <div id="eval-report">${r ? renderReport(task) : '<div class="empty" style="height:200px;display:flex;align-items:center;justify-content:center">填写面试记录后生成报告</div>'}</div>
    </div>
  </div>`;
}

function renderReport(task) {
  const r = task.report; if (!r) return "";
  const canEdit = task.status !== "confirmed" && (task.assignedInterviewers.includes(state.currentUser.name) || state.currentUser.role !== "interviewer");
  return `
    <div class="kit-card" style="padding:20px;margin-bottom:16px"><h3 style="font-weight:600;margin-bottom:8px">AI 总结</h3><p style="font-size:14px;color:#a1a1aa;line-height:1.6">${esc(r.summary)}</p></div>
    <h3 style="font-weight:600;margin-bottom:12px">五维评估</h3>
    ${r.dimensions.map(d => {
      const meta = DIMENSION_LABELS[d.key], eff = getEffectiveScore(d.key, d.score, task.overrides), ov = task.overrides.find(o => o.dimensionKey === d.key);
      const [bg,col] = scoreStyle(eff).split(",");
      return `<div class="dim-card"><div class="dim-head"><div><div style="font-weight:600">${meta.label}</div><div style="font-size:12px;color:#71717a">${meta.desc}</div></div>
        <div style="display:flex;align-items:center;gap:8px"><div class="dim-score" style="background:${bg};color:${col}">${eff}</div>
        ${canEdit ? `<button class="kit-btn-secondary" style="padding:4px 10px;font-size:11px" onclick="openOverride('${task.id}','${d.key}',${d.score})">修改</button>` : ""}</div></div>
        <div style="height:6px;background:rgba(255,255,255,.05);border-radius:999px"><div style="width:${eff/5*100}%;height:100%;border-radius:999px;background:linear-gradient(90deg,#ef4444,#f59e0b,#22c55e)"></div></div>
        ${d.evidence.map(e => `<div class="evidence">${esc(e)}</div>`).join("")}
        ${ov ? `<div class="override-note">已覆盖：AI ${ov.originalScore}→${ov.newScore} · ${esc(ov.reason)}</div>` : ""}</div>`;
    }).join("")}
    ${r.followUps.length ? `<div class="kit-card" style="padding:20px;margin-top:16px"><h3 style="font-weight:600;margin-bottom:12px">追问建议</h3>${r.followUps.map(f => `<div style="background:rgba(255,255,255,.05);border-radius:8px;padding:12px;margin-bottom:8px;font-size:13px"><div style="font-weight:500">${esc(f.question)}</div><div style="color:#71717a;font-size:12px;margin-top:4px">考察：${esc(f.focus)}</div></div>`).join("")}</div>` : ""}
    ${r.redFlags.length ? `<div style="border:1px solid rgba(239,68,68,.2);background:rgba(239,68,68,.05);border-radius:16px;padding:20px;margin-top:16px"><h3 style="color:#f87171;font-weight:600;margin-bottom:12px">红线预警</h3>${r.redFlags.map(rf => `<div class="kit-card" style="padding:12px;margin-bottom:8px;font-size:13px"><span style="background:rgba(239,68,68,.2);color:#f87171;padding:2px 8px;border-radius:4px;font-size:11px">${esc(rf.type)}</span><p style="margin-top:8px;color:#d4d4d8">${esc(rf.description)}</p></div>`).join("")}</div>` : ""}
    ${canEdit ? `<div class="kit-card" style="padding:20px;margin-top:16px"><h3 style="font-weight:600;margin-bottom:8px">确认评估</h3>
      <textarea id="add-comment" rows="2" class="kit-textarea" placeholder="补充个人判断（可选）">${esc(task.additionalComment||"")}</textarea>
      <button onclick="confirmEval('${task.id}')" style="width:100%;margin-top:12px;padding:12px;border:none;border-radius:9999px;background:#10b981;color:#000;font-weight:600;cursor:pointer">确认评估</button></div>` :
      task.status === "confirmed" ? `<div style="border:1px solid rgba(16,185,129,.2);background:rgba(16,185,129,.05);border-radius:16px;padding:20px;margin-top:16px"><p style="color:#34d399;font-weight:500">已由 ${esc(task.confirmedBy)} 确认</p>${task.additionalComment?`<p style="font-size:14px;color:#6ee7b7;margin-top:8px">${esc(task.additionalComment)}</p>`:""}</div>` : ""}`;
}

window.generateEval = async function(id) {
  const task = state.tasks.find(t => t.id === id); if (!task) return;
  const notes = document.getElementById("eval-notes").value;
  const btn = document.getElementById("gen-btn"); btn.textContent = "AI 评估中..."; btn.disabled = true;
  const result = await callAI({ candidateName: task.candidateName, positionTitle: task.positionTitle, resume: task.resume, jobDescription: task.jobDescription, interviewNotes: notes });
  task.interviewNotes = notes; task.report = result.report; task.status = "evaluated"; task.overrides = []; task.updatedAt = new Date().toISOString(); saveState(state);
  if (result.message) document.getElementById("eval-notice").innerHTML = `<div class="alert alert-warn">${esc(result.message)}</div>`;
  document.getElementById("eval-report").innerHTML = renderReport(task);
  btn.textContent = "重新生成评估"; btn.disabled = false;
};

window.confirmEval = function(id) {
  const task = state.tasks.find(t => t.id === id); if (!task) return;
  task.status = "confirmed"; task.confirmedBy = state.currentUser.name; task.confirmedAt = new Date().toISOString();
  task.additionalComment = document.getElementById("add-comment")?.value || ""; saveState(state); navigate("evaluations/" + id);
};

window.openOverride = function(taskId, dimKey, origScore) { modal = { taskId, dimKey, origScore, newScore: origScore, reason: "" }; renderModal(); };

function renderModal() {
  if (!modal) return;
  document.getElementById("modal-root")?.remove();
  const meta = DIMENSION_LABELS[modal.dimKey];
  const el = document.createElement("div"); el.className = "modal-bg"; el.id = "modal-root";
  el.innerHTML = `<div class="modal"><h3>覆盖评分 · ${meta.label}</h3><p style="font-size:14px;color:#71717a;margin-top:4px">AI 原始：${modal.origScore} 分</p>
    <div class="score-btns">${[1,2,3,4,5].map(s => `<button class="${modal.newScore===s?"active":""}" onclick="modal.newScore=${s};renderModal()">${s}</button>`).join("")}</div>
    <div class="form-group"><label>修改原因 * (${modal.reason.length}/50)</label><textarea rows="2" maxlength="50" class="kit-textarea" oninput="modal.reason=this.value;document.getElementById('reason-len').textContent=modal.reason.length">${esc(modal.reason)}</textarea><span id="reason-len" style="font-size:12px;color:#71717a">${modal.reason.length}</span></div>
    <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:16px">
      <button class="kit-btn-secondary" style="padding:10px 20px;font-size:13px" onclick="closeModal()">取消</button>
      <button class="kit-btn-primary" style="padding:10px 20px;font-size:13px;border:none" onclick="submitOverride()" ${!modal.reason.trim()?"disabled style='opacity:.5'":""}>确认覆盖</button>
    </div></div>`;
  el.onclick = e => { if (e.target === el) closeModal(); };
  document.body.appendChild(el);
}

window.closeModal = function() { document.getElementById("modal-root")?.remove(); modal = null; };
window.submitOverride = function() {
  if (!modal || !modal.reason.trim()) return;
  const task = state.tasks.find(t => t.id === modal.taskId); if (!task) return;
  task.overrides = task.overrides.filter(o => o.dimensionKey !== modal.dimKey);
  task.overrides.push({ dimensionKey: modal.dimKey, originalScore: modal.origScore, newScore: modal.newScore, reason: modal.reason.trim(), modifiedBy: state.currentUser.name, modifiedAt: new Date().toISOString() });
  saveState(state); closeModal(); navigate("evaluations/" + modal.taskId);
};

function renderSettings() {
  const s = loadSettings();
  return `<div class="kit-container" style="padding:40px 24px;max-width:560px">
    <p class="kit-section-label mb-2">配置</p><div class="page-title">API 设置</div><div class="page-sub mb-6">HTML 版需本地代理调用 DeepSeek</div>
    <div class="alert alert-info mb-6">1. 运行 <code>python api-proxy.py</code><br>2. 填入 API Key 和代理地址<br>3. 未配置时使用模拟评估</div>
    <form class="kit-card" style="padding:24px" onsubmit="saveSettingsForm(event)">
      <div class="form-group"><label>DeepSeek API Key</label><input id="s-key" type="password" class="kit-input" value="${esc(s.apiKey)}" placeholder="sk-..." /></div>
      <div class="form-group"><label>API 地址</label><input id="s-url" class="kit-input" value="${esc(s.baseUrl)}" /></div>
      <div class="form-group"><label>模型</label><input id="s-model" class="kit-input" value="${esc(s.model)}" /></div>
      <button type="submit" class="kit-btn-primary" style="border:none;cursor:pointer">保存设置</button>
    </form>
  </div>`;
}

window.saveSettingsForm = function(e) {
  e.preventDefault();
  saveSettings({ apiKey: document.getElementById("s-key").value.trim(), baseUrl: document.getElementById("s-url").value.trim(), model: document.getElementById("s-model").value.trim() });
  alert("设置已保存");
};

function render() {
  closeModal();
  let content = "";
  if (route === "landing" || route === "") content = renderLanding();
  else if (route === "dashboard") content = renderDashboard();
  else if (route === "tasks/new") content = renderCreateTask();
  else if (route === "settings") content = renderSettings();
  else if (route.startsWith("evaluations/")) content = renderEvaluation(route.slice(12));
  else content = renderLanding();
  document.getElementById("app").innerHTML = renderHeader() + content;
}

render();
</script>
</body>
</html>
